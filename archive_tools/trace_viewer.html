<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trace Viewer</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        input, button { padding: 8px; font-size: 14px; }
        input { background: #2d2d2d; border: 1px solid #555; color: #fff; width: 200px; }
        button { background: #0a7dd4; border: none; color: white; cursor: pointer; }
        button:hover { background: #0d5fb8; }

        #legend {
            display: flex; flex-wrap: wrap; gap: 6px 14px;
            margin: 14px 0;
            padding: 10px 14px;
            background: #252526;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 12px;
        }
        #legend .item { display: inline-flex; align-items: center; gap: 6px; }
        #legend .sw {
            display: inline-block; width: 10px; height: 10px;
            border-radius: 2px;
        }

        #trace {
            white-space: pre-wrap;
            margin-top: 16px;
            background: #252526;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            line-height: 1.5;
        }

        /* Role badges */
        .role { font-weight: bold; padding: 0 4px; border-radius: 2px; }
        .role-system    { color: #ff8a65; background: #3a2520; }
        .role-user      { color: #ffd54f; background: #3a3320; }
        .role-assistant { color: #82b1ff; background: #20283a; }
        .role-tool      { color: #b39ddb; background: #2b223a; }

        /* Glyph constructs */
        .plan      { color: #2196f3; }   /* vivid blue */
        .act       { color: #9c27b0; }   /* deep purple */
        .think     { color: #d1c4e9; font-style: italic; }   /* pale lavender */
        .call      { color: #ec407a; }   /* pink */
        .result    { color: #26c6da; }   /* cyan */
        .response  { color: #66bb6a; }   /* green */
        .reply     { color: #66bb6a; }   /* green */
        .todo      { color: #ff9800; }   /* vivid orange */
        .rationale { color: #cddc39; }   /* lime */

        /* Operators */
        .op-tag    { color: #ef5350; }   /* 🏷 = red */
        .op-ref    { color: #ffeb3b; }   /* ※ = bright yellow */
        .op-sat    { color: #4dd0e1; }   /* ⊨ = light cyan */
        .op-prob   { color: #7986cb; }   /* 𝑝 = indigo */
        .op-maps   { color: #757575; }   /* ↦ = gray */
        .op-sep    { color: #757575; }   /* • = gray */
        .longstr   { color: #c5c5c5; }   /* 「…」 light gray */
    </style>
</head>
<body>
    <h1>Trace Viewer</h1>
    <input type="number" id="traceId" placeholder="Trace ID (1-based)" min="1">
    <button onclick="loadTrace()">Load</button>

    <div id="legend">
        <strong style="margin-right:8px">Legend</strong>
        <span class="item"><span class="sw" style="background:#ff8a65"></span><span class="role role-system">system</span></span>
        <span class="item"><span class="sw" style="background:#ffd54f"></span><span class="role role-user">user</span></span>
        <span class="item"><span class="sw" style="background:#82b1ff"></span><span class="role role-assistant">assistant</span></span>
        <span class="item"><span class="sw" style="background:#b39ddb"></span><span class="role role-tool">tool</span></span>
        <span class="item"><span class="sw" style="background:#2196f3"></span><span class="plan">plan</span></span>
        <span class="item"><span class="sw" style="background:#9c27b0"></span><span class="act">act</span></span>
        <span class="item"><span class="sw" style="background:#d1c4e9"></span><span class="think">think</span></span>
        <span class="item"><span class="sw" style="background:#ec407a"></span><span class="call">call</span></span>
        <span class="item"><span class="sw" style="background:#26c6da"></span><span class="result">result</span></span>
        <span class="item"><span class="sw" style="background:#66bb6a"></span><span class="response">response</span>/<span class="reply">reply</span></span>
        <span class="item"><span class="sw" style="background:#ff9800"></span><span class="todo">todo</span></span>
        <span class="item"><span class="sw" style="background:#cddc39"></span><span class="rationale">rationale</span></span>
        <span class="item"><span class="sw" style="background:#ef5350"></span><span class="op-tag">🏷 tag</span></span>
        <span class="item"><span class="sw" style="background:#ffeb3b"></span><span class="op-ref">※ ref</span></span>
        <span class="item"><span class="sw" style="background:#4dd0e1"></span><span class="op-sat">⊨ satisfies</span></span>
        <span class="item"><span class="sw" style="background:#7986cb"></span><span class="op-prob">𝑝 prob</span></span>
        <span class="item"><span class="sw" style="background:#c5c5c5"></span><span class="longstr">「string」</span></span>
    </div>

    <div id="trace"></div>

    <script>
        let traces = [];
        const DATASET_PATH = '/synthetic_data/gold_glyph_2500.jsonl';

        async function loadData() {
            const resp = await fetch(DATASET_PATH);
            const text = await resp.text();
            traces = text.trim().split('\n').map(line => JSON.parse(line));
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function colorize(body) {
            let s = escapeHtml(body);

            // Long-string brackets first (greedy across newlines disabled by per-char)
            s = s.replace(/「([\s\S]*?)」/g, '<span class="longstr">「$1」</span>');

            // Block keywords at word boundaries
            const blocks = ['plan', 'act', 'think', 'call', 'result', 'response', 'reply', 'todo', 'rationale'];
            for (const b of blocks) {
                const re = new RegExp('\\b(' + b + ')\\b(?=\\s*[\\{↦「])', 'g');
                s = s.replace(re, '<span class="' + b + '">$1</span>');
            }

            // Operators
            s = s.replace(/🏷/g, '<span class="op-tag">🏷</span>');
            s = s.replace(/※/g, '<span class="op-ref">※</span>');
            s = s.replace(/⊨/g, '<span class="op-sat">⊨</span>');
            s = s.replace(/𝑝/g, '<span class="op-prob">𝑝</span>');
            s = s.replace(/↦/g, '<span class="op-maps">↦</span>');
            s = s.replace(/•/g, '<span class="op-sep">•</span>');

            return s;
        }

        function renderTrace(t) {
            let s = escapeHtml(t);

            s = s.replace(/&lt;\|im_start\|&gt;(system|user|assistant|tool)/g, (_, role) => {
                return `<span class="role role-${role}">&lt;|im_start|&gt;${role}</span>`;
            });
            s = s.replace(/&lt;\|im_end\|&gt;/g, '<span class="role">&lt;|im_end|&gt;</span>');

            // Re-run construct highlighting on the raw text view.
            s = s.replace(/「([\s\S]*?)」/g, '<span class="longstr">「$1」</span>');

            const blocks = ['plan', 'act', 'think', 'call', 'result', 'response', 'reply', 'todo', 'rationale'];
            for (const b of blocks) {
                const re = new RegExp('\\b(' + b + ')\\b(?=\\s*[\\{↦「])', 'g');
                s = s.replace(re, '<span class="' + b + '">$1</span>');
            }

            s = s.replace(/🏷/g, '<span class="op-tag">🏷</span>');
            s = s.replace(/※/g, '<span class="op-ref">※</span>');
            s = s.replace(/⊨/g, '<span class="op-sat">⊨</span>');
            s = s.replace(/𝑝/g, '<span class="op-prob">𝑝</span>');
            s = s.replace(/↦/g, '<span class="op-maps">↦</span>');
            s = s.replace(/•/g, '<span class="op-sep">•</span>');

            return s;
        }

        async function loadTrace() {
            if (traces.length === 0) await loadData();

            const id = parseInt(document.getElementById('traceId').value);
            const container = document.getElementById('trace');

            if (isNaN(id) || id < 1 || id > traces.length) {
                container.textContent = `Invalid trace ID. Use 1-${traces.length}`;
                return;
            }

            container.innerHTML = renderTrace(traces[id - 1].trace);
        }

        loadData().then(() => {
            document.getElementById('traceId').max = traces.length;
            document.getElementById('traceId').placeholder = `1-${traces.length}`;
        });
    </script>
</body>
</html>
