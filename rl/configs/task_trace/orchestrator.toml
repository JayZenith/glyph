batch_size = 48
rollouts_per_example = 4
seq_len = 5120
max_steps = 200

[model]
name = "JayZenith/SFT_V1"

[train.sampling]
temperature = 0.8
max_completion_tokens = 1536

[[train.env]]
id = "task-trace"
args = { data_path = "synthetic_data/rl_prompts_1062.jsonl", timeout = 30, max_tool_rounds = 15 }

[[filters]]
type = "gibberish"
enforce = false

[[filters]]
type = "repetition"
enforce = false

[[filters]]
type = "zero_advantage"
enforce = false

[ckpt]
interval = 1000
