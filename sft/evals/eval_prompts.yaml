        content: |
          fn main() { for n in 1..=3 { println!("{n}"); } }
      - tool: apply_patch
        content: |
          status: success
      - tool: cargo_run
        content: |
          status: failed
          stdout: 1
          2
          3
          stderr: missing final line 4
      - tool: read_file
        content: |
          fn main() { for n in 1..=4 { println!("{n}"); } }
      - tool: apply_patch
        content: |
          status: success
      - tool: cargo_run
        content: |
          status: success
          stdout: 1
          2
          3
          4

