<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trace Viewer</title>
  <style>
    :root {
      --bg: #f3efe7;
      --panel: #fffaf0;
      --ink: #1f1a17;
      --muted: #6e6258;
      --border: #d7c8b7;
      --call: #e8f1ff;
      --tool: #eef8ec;
      --result: #fff2d9;
      --final: #fde2e4;
      --plain: #f7f2ea;
      --good: #1f7a3d;
      --bad: #9b2226;
      --accent: #234e70;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 20px/1.12 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-weight: 525;
      color: var(--ink);
      background: linear-gradient(180deg, #f6f2ea 0%, #efe7da 100%);
    }
    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }
    .sidebar, .main {
      padding: 12px;
    }
    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(255, 250, 240, 0.84);
      backdrop-filter: blur(8px);
      overflow: auto;
    }
    .main {
      overflow: auto;
    }
    h1, h2, h3 {
      margin: 0 0 6px;
      font-size: 21px;
    }
    .controls, .summary, .card, .viewer {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(31, 26, 23, 0.06);
    }
    .controls, .summary, .viewer {
      padding: 10px;
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    button, label.file {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
    }
    button:hover, label.file:hover { border-color: var(--accent); }
    input[type="file"] { display: none; }
    .hint, .meta, .empty {
      color: var(--muted);
      font-size: 18px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .stat {
      padding: 8px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--border);
    }
    .stat .k {
      color: var(--muted);
      font-size: 17px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat .v {
      font-size: 26px;
      font-weight: 700;
      margin-top: 4px;
    }
    .list {
      display: grid;
      gap: 6px;
    }
    .card {
      padding: 8px 9px;
      cursor: pointer;
    }
    .card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(35, 78, 112, 0.12);
    }
    .title {
      font-weight: 700;
      margin-bottom: 0;
      word-break: break-word;
    }
    .badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .badge {
      padding: 0 5px;
      border-radius: 999px;
      font-size: 17px;
      border: 1px solid var(--border);
      background: #fff;
    }
    .badge.good {
      color: var(--good);
      border-color: rgba(31, 122, 61, 0.3);
      background: rgba(31, 122, 61, 0.08);
    }
    .badge.bad {
      color: var(--bad);
      border-color: rgba(155, 34, 38, 0.24);
      background: rgba(155, 34, 38, 0.08);
    }
    .viewer {
      min-height: calc(100vh - 24px);
    }
    .trace-block {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2px 4px;
      margin-bottom: 2px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .trace-block.call { background: var(--call); }
    .trace-block.tool { background: var(--tool); }
    .trace-block.result { background: var(--result); }
    .trace-block.final { background: var(--final); }
    .trace-block.plain { background: var(--plain); }
    .trace-label {
      font-size: 17px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0;
      font-weight: 700;
    }
    .section {
      margin-bottom: 6px;
    }
    .section h3 {
      margin-bottom: 0;
    }
    .section:has(.trace-block) {
      margin-bottom: 2px;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.22;
      font-size: 20px;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
      .viewer { min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="controls">
        <h1>Trace Viewer</h1>
        <div class="row">
          <input id="pathInput" type="text" value="/results/eval_formal_post_eval_flatroots.json" placeholder="/results/eval_formal_post_eval_flatroots.json">
          <button id="loadBtn">Load</button>
        </div>
        <div class="row">
          <label class="file">
            Open JSON
            <input id="fileInput" type="file" accept=".json,.jsonl,application/json">
          </label>
        </div>
        <div class="hint">Serve repo root with `python -m http.server`, then open `http://localhost:8000/tools/trace_viewer.html?file=/results/...json`.</div>
      </div>

      <div class="summary" id="summary">
        <div class="empty">No eval loaded yet.</div>
      </div>

      <div class="list" id="traceList"></div>
    </aside>

    <main class="main">
      <div class="viewer" id="viewer">
        <div class="empty">Load an eval JSON to inspect traces.</div>
      </div>
    </main>
  </div>

  <script>
    const summaryEl = document.getElementById("summary");
    const listEl = document.getElementById("traceList");
    const viewerEl = document.getElementById("viewer");
    const pathInput = document.getElementById("pathInput");
    const loadBtn = document.getElementById("loadBtn");
    const fileInput = document.getElementById("fileInput");

    let currentRows = [];
    let activeIndex = -1;
    function esc(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function parseRows(payload) {
      if (payload?.results?.sft && Array.isArray(payload.results.sft)) return payload.results.sft;
      if (Array.isArray(payload)) return payload;
      throw new Error("Unsupported JSON shape.");
    }

    function makeSummary(payload, rows) {
      const valid = rows.filter(r => r.metrics?.valid_trace).length;
      const avgScore = rows.length
        ? (rows.reduce((n, r) => n + (r.metrics?.score ?? 0), 0) / rows.length).toFixed(2)
        : "0.00";
      const runArgs = payload?.run?.args || {};
      summaryEl.innerHTML = `
        <h2>Summary</h2>
        <div class="summary-grid">
          <div class="stat"><div class="k">Eval Tests</div><div class="v">${rows.length}</div></div>
          <div class="stat"><div class="k">Valid</div><div class="v">${valid}</div></div>
          <div class="stat"><div class="k">Avg Score</div><div class="v">${avgScore} / 14</div></div>
          <div class="stat"><div class="k">Model</div><div class="v" style="font-size:12px">${esc(runArgs.sft_model || runArgs.base || "n/a")}</div></div>
        </div>
        <div class="hint" style="margin-top:10px">Avg score is the mean per-test formal eval score, currently on a 0-14 scale.</div>
      `;
    }

    function compactWhitespace(text) {
      return text
        .replace(/<\|im_start\|>\w+\n?/g, "")
        .replace(/<\|im_end\|>/g, "")
        .replace(/\r\n/g, "\n")
        .replace(/\n{3,}/g, "\n\n")
        .replace(/[ \t]+\n/g, "\n")
        .replace(/^\n+|\n+$/g, "")
        .trim();
    }

    function classifySegment(text) {
      const trimmed = text.trim();
      if (!trimmed) return null;
      if (trimmed.startsWith("CALL ")) return "call";
      if (trimmed.startsWith("RESULT ")) return "result";
      if (trimmed.startsWith("FINAL:")) return "final";
      return "plain";
    }

    function splitTrace(output) {
      const segRe = /<\|im_start\|>(\w+)\n([\s\S]*?)<\|im_end\|>/g;
      const segments = [];
      let last = 0;
      let match;

      while ((match = segRe.exec(output)) !== null) {
        if (match.index > last) {
          const raw = output.slice(last, match.index);
          const kind = classifySegment(raw);
          if (kind) segments.push({ kind, label: kind.toUpperCase(), text: compactWhitespace(raw) });
        }
        const role = match[1];
        const body = compactWhitespace(match[2]);
        if (body) {
          if (role === "tool") {
            segments.push({ kind: "tool", label: "TOOL", text: body });
          } else {
            const kind = classifySegment(body) || "plain";
            segments.push({ kind, label: role.toUpperCase(), text: body });
          }
        }
        last = segRe.lastIndex;
      }

      if (last < output.length) {
        const raw = output.slice(last);
        const kind = classifySegment(raw);
        if (kind) segments.push({ kind, label: kind.toUpperCase(), text: compactWhitespace(raw) });
      }
      return segments;
    }

    function renderList(rows) {
      listEl.innerHTML = "";
      rows.forEach((row, idx) => {
        const metrics = row.metrics || {};
        const card = document.createElement("button");
        card.className = "card" + (idx === activeIndex ? " active" : "");
        card.innerHTML = `
          <div class="title">${esc(row.name || `trace_${idx}`)}</div>
          <div class="badges">
            <span class="badge ${metrics.valid_trace ? "good" : "bad"}">${metrics.valid_trace ? "valid" : "invalid"}</span>
            <span class="badge">score ${metrics.score ?? "?"}</span>
            <span class="badge">${esc(metrics.kind || "unknown")}</span>
          </div>
          <div class="meta">${esc((row.prompt || "").slice(0, 120))}${(row.prompt || "").length > 120 ? "..." : ""}</div>
        `;
        card.onclick = () => {
          activeIndex = idx;
          renderList(rows);
          renderTrace(rows[idx]);
        };
        listEl.appendChild(card);
      });
    }

    function renderTrace(row) {
      const metrics = row.metrics || {};
      const failures = metrics.failure_buckets || [];
      const segments = splitTrace(row.output || "");
      viewerEl.innerHTML = `
        <div class="section">
          <h2>${esc(row.name || "trace")}</h2>
        </div>
        <div class="section">
          <div class="badges">
            <span class="badge ${metrics.valid_trace ? "good" : "bad"}">${metrics.valid_trace ? "valid" : "invalid"}</span>
            <span class="badge">score ${metrics.score ?? "?"}</span>
            <span class="badge">${esc(metrics.kind || "unknown")}</span>
          </div>
          <div class="meta">Failures: ${failures.length ? esc(failures.join(", ")) : "none"}</div>
        </div>
        <div class="section">
          <h3>Prompt</h3>
          <div class="trace-block plain"><pre>${esc(compactWhitespace(row.prompt || ""))}</pre></div>
        </div>
        <div class="section">
          <h3>Trace</h3>
          ${segments.map(seg => `
            <div class="trace-block ${seg.kind}">
              <div class="trace-label">${esc(seg.label)}</div>
              <pre>${esc(seg.text)}</pre>
            </div>
          `).join("") || `<div class="empty">No output.</div>`}
        </div>
        <div class="hint" style="margin-top:6px">Avg score is the mean per-test formal eval score, currently on a 0-14 scale.</div>
      `;
    }

    function renderPayload(payload) {
      currentRows = parseRows(payload);
      activeIndex = currentRows.length ? 0 : -1;
      makeSummary(payload, currentRows);
      renderList(currentRows);
      if (currentRows.length) {
        renderTrace(currentRows[0]);
      } else {
        viewerEl.innerHTML = `<div class="empty">No rows found.</div>`;
      }
    }

    function normalizePath(path) {
      if (/^(https?:|file:)/.test(path) || path.startsWith("/")) return path;
      return `/${path}`;
    }

    async function loadFromPath(path) {
      const normalized = normalizePath(path);
      const res = await fetch(normalized);
      if (!res.ok) throw new Error(`Failed to fetch ${path}: ${res.status}`);
      const payload = await res.json();
      renderPayload(payload);
    }

    function setStatus(message) {
      summaryEl.innerHTML = `<div class="empty">${esc(message)}</div>`;
      listEl.innerHTML = "";
      viewerEl.innerHTML = `<div class="empty">${esc(message)}</div>`;
    }

    loadBtn.onclick = async () => {
      const path = pathInput.value.trim() || "/results/eval_formal_post_eval_flatroots.json";
      if (!path) return;
      const normalized = normalizePath(path);
      const url = new URL(window.location.href);
      url.searchParams.set("file", normalized);
      history.replaceState(null, "", url);
      try {
        pathInput.value = normalized;
        setStatus(`Loading ${normalized}...`);
        await loadFromPath(normalized);
      } catch (err) {
        setStatus(err.message);
      }
    };

    fileInput.onchange = async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        renderPayload(JSON.parse(text));
      } catch (err) {
        setStatus(`Failed to read file: ${err.message}`);
      }
    };

    const qsFile = new URLSearchParams(window.location.search).get("file");
    if (qsFile) {
      const normalized = normalizePath(qsFile);
      pathInput.value = normalized;
      loadFromPath(normalized).catch(err => setStatus(err.message));
    }
  </script>
</body>
</html>
