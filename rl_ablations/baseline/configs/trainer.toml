output_dir = "/workspace/glyph/rl_ablations/baseline"
matmul_precision = "high"
max_steps = 200
max_async_level = 1
enable_router_replay = false
dist_timeout_seconds = 600
max_concurrent_runs = 1

[model]
name = "Qwen/Qwen3-4B-Base"
trust_remote_code = false
seq_len = 2048
attn = "sdpa"
fsdp_cpu_offload = false
optim_cpu_offload = false
reshard_after_forward = true
dp_replicate = 1
ep = 1
ep_comm_backend = "torch"
deepep_num_sms = 20
cp = 1
cp_style = "ring"
impl = "auto"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"
moe_use_grouped_mm = true
fp8 = false
freeze_moe_router = false
fused_lm_head_token_chunk_size = "disabled"

[model.lora]
rank = 64
alpha = 64.0
dropout = 0.05
target_modules = [
    "k_proj",
    "o_proj",
    "q_proj",
    "up_proj",
    "v_proj",
    "gate_proj",
    "down_proj",
]
modules_to_save = [
    "lm_head",
]

[model.debug]
random_init = false
force_balanced_routing = false

[tokenizer]
name = "Qwen/Qwen3-4B-Base"
trust_remote_code = false

[data]

[loss]
type = "default"
dppo_mask_low = 0.2
dppo_mask_high = 0.2
adv_tau = 1.0
teacher_tau = 0.0
kl_tau = 0.001

[optim]
lr = 1e-06
weight_decay = 0.01
max_norm = 1.0
type = "adamw"
betas1 = 0.9
betas2 = 0.999

[scheduler]
type = "constant"

[ckpt]
interval = 1000
skip_gather_master_weights = false
weights_only = false
skip_progress = false
skip_scheduler = false
skip_dataloader = false
skip_optimizer = false

[ckpt.weights]
save_sharded = true
save_format = "safetensors"
save_adapter_separately = false

[weight_broadcast]
type = "filesystem"
save_sharded = true
save_format = "safetensors"

[rollout_transport]
type = "filesystem"

[log]
level = "info"
vf_level = "info"
json_logging = false
log_data = false
ranks_filter = [
    0,
]

[wandb]
project = "prime-rl"
offline = true

[gc]
interval = 50

[experimental]
