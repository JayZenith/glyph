<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RLVR Rollout Trace Viewer</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel2: #1c2129;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --sys: #a371f7;
    --user: #58a6ff;
    --assistant: #3fb950;
    --tool: #e3b341;
    --pos: #3fb950;
    --neg: #f85149;
    --zero: #8b949e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }
  header {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .grow { flex: 1; }
  select, button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 9px; font-size: 13px; cursor: pointer;
  }
  button:hover, select:hover { border-color: var(--muted); }
  label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  .step-badge {
    background: #1f6feb33; border: 1px solid #1f6feb; color: #58a6ff;
    padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 600;
  }
  #pathBar { background: var(--panel2); border-bottom: 1px solid var(--border); padding: 5px 16px; font-size: 11.5px; color: var(--muted); font-family: ui-monospace, Menlo, monospace; }
  #pathBar span { color: var(--user); }
  main { flex: 1; display: flex; min-height: 0; }
  #sidebar {
    width: 270px; background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; flex-shrink: 0;
  }
  .row-item {
    padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer;
    display: flex; align-items: center; gap: 8px; font-size: 12px;
  }
  .row-item:hover { background: var(--panel2); }
  .row-item.active { background: #1f6feb22; border-left: 3px solid #1f6feb; padding-left: 9px; }
  .row-item .ex { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pill {
    font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600;
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }
  .pill.pos { background: #3fb95022; color: var(--pos); border: 1px solid #3fb95055; }
  .pill.neg { background: #f8514922; color: var(--neg); border: 1px solid #f8514955; }
  .pill.zero { background: #8b949e22; color: var(--zero); border: 1px solid #8b949e55; }
  #content { flex: 1; overflow-y: auto; padding: 16px 22px; }
  .meta {
    display: flex; flex-wrap: wrap; gap: 8px 16px; margin-bottom: 16px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
  }
  .meta .kv { font-size: 12px; }
  .meta .kv b { color: var(--muted); font-weight: 500; margin-right: 5px; }
  .flag { font-size: 11px; padding: 2px 7px; border-radius: 10px; border: 1px solid; }
  .flag.on { background: #f8514922; color: var(--neg); border-color: #f8514955; }
  .flag.off { background: #8b949e15; color: var(--muted); border-color: var(--border); }
  .msg { border-radius: 8px; margin-bottom: 10px; overflow: hidden; border: 1px solid var(--border); }
  .msg .head {
    padding: 5px 12px; font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .04em; display: flex; gap: 10px; align-items: center;
  }
  .msg .head .sub { font-weight: 400; text-transform: none; color: var(--muted); letter-spacing: 0; }
  .msg pre {
    margin: 0; padding: 10px 14px; white-space: pre-wrap; word-break: break-word;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px; line-height: 1.55;
  }
  .role-system .head { background: #a371f725; color: var(--sys); } .role-system { border-color: #a371f755; }
  .role-user .head { background: #58a6ff25; color: var(--user); } .role-user { border-color: #58a6ff55; }
  .role-assistant .head { background: #3fb95025; color: var(--assistant); } .role-assistant { border-color: #3fb95055; }
  .role-tool .head { background: #e3b34125; color: var(--tool); } .role-tool { border-color: #e3b34155; }
  .role-text .head { background: #8b949e22; color: var(--muted); }
  .section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 8px; }
  .tok-CALL { color: var(--user); font-weight: 700; }
  .tok-RESULT { color: var(--tool); font-weight: 700; }
  .tok-FINAL { color: var(--assistant); font-weight: 700; }
  .tok-im { color: #6e7681; }
  .empty { color: var(--muted); text-align: center; margin-top: 60px; }
  .repeat-warn { background: #f8514922; color: var(--neg); border: 1px solid #f8514955; padding: 2px 7px; border-radius: 10px; font-size: 11px; }
  .legend { display: flex; gap: 12px; font-size: 11px; }
  .legend span { display: flex; align-items: center; gap: 4px; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
</style>
</head>
<body>
<header>
  <h1>RLVR Rollout Viewer</h1>
  <span class="step-badge" id="stepBadge">step ?</span>
  <label>Dir</label><select id="dirSel"></select>
  <label>Step</label><select id="stepSel"></select>
  <button id="prevStep">◀</button><button id="nextStep">▶</button>
  <label>File</label>
  <button id="pickBtn">Open .jsonl…</button>
  <input type="file" id="fileInput" accept=".jsonl,.json,.txt" style="display:none">
  <button id="urlBtn">Load URL</button>
  <label>Sort</label>
  <select id="sortSel">
    <option value="orig">original</option>
    <option value="rdesc">reward ↓</option>
    <option value="rasc">reward ↑</option>
  </select>
  <span class="grow"></span>
  <span class="legend">
    <span><i class="dot" style="background:var(--sys)"></i>system</span>
    <span><i class="dot" style="background:var(--user)"></i>user</span>
    <span><i class="dot" style="background:var(--assistant)"></i>assistant</span>
    <span><i class="dot" style="background:var(--tool)"></i>tool</span>
  </span>
</header>
<div id="pathBar">📄 <span id="pathLabel">—</span></div>
<main>
  <div id="sidebar"></div>
  <div id="content"><div class="empty">Loading…</div></div>
</main>
<script>
const BASE = "../results/RLVR1/";
const FILE = "train_rollouts.jsonl";
let ROOT = BASE + "rollouts/";
let steps = [], curStep = null, rows = [], curRow = 0;

function rewardClass(r){ return r > 0.001 ? "pos" : r < -0.001 ? "neg" : "zero"; }

function pathFor(s){ return `${ROOT}step_${s}/${FILE}`; }
function setPath(p){ document.getElementById("pathLabel").textContent = p; }

async function discoverDirs(){
  const html = await (await fetch(BASE)).text();
  const set = new Set();
  for (const m of html.matchAll(/href="(rollouts[^"\/]*)\/?"/g)) set.add(m[1]);
  const dirs = [...set].sort();
  document.getElementById("dirSel").innerHTML = dirs.map(d=>`<option value="${d}">${d}</option>`).join("");
  return dirs;
}

async function discoverSteps(){
  const html = await (await fetch(ROOT)).text();
  const set = new Set();
  for (const m of html.matchAll(/step_(\d+)/g)) set.add(parseInt(m[1]));
  steps = [...set].sort((a,b)=>a-b);
  document.getElementById("stepSel").innerHTML = steps.map(s=>`<option value="${s}">step_${s}</option>`).join("");
}

async function loadDir(dir, keepStep){
  ROOT = BASE + dir + "/";
  await discoverSteps();
  const s = (keepStep!=null && steps.includes(keepStep)) ? keepStep : steps[0];
  if (s!=null) loadStep(s);
}

function loadText(txt, label){
  rows = txt.split("\n").filter(l=>l.trim()).map((l,i)=>{
    try { return JSON.parse(l); } catch(e){ return {example_id:"parse-error@"+(i+1), reward:0, completion:[{role:"text",content:l}], info:{}}; }
  });
  curRow = 0;
  document.getElementById("stepBadge").textContent = label;
  renderSidebar();
  renderRow();
}

async function loadStep(s){
  curStep = s;
  document.getElementById("stepSel").value = s;
  const p = pathFor(s);
  setPath(p);
  const txt = await (await fetch(p)).text();
  loadText(txt, `${document.getElementById("dirSel").value} · step ${s}`);
}

function sortedIdx(){
  const idx = rows.map((_,i)=>i);
  const mode = document.getElementById("sortSel").value;
  if (mode==="rdesc") idx.sort((a,b)=>rows[b].reward-rows[a].reward);
  if (mode==="rasc") idx.sort((a,b)=>rows[a].reward-rows[b].reward);
  return idx;
}

function renderSidebar(){
  const sb = document.getElementById("sidebar");
  sb.innerHTML = "";
  for (const i of sortedIdx()){
    const r = rows[i];
    const div = document.createElement("div");
    div.className = "row-item" + (i===curRow ? " active":"");
    const kind = (r.info && r.info.kind) || "";
    div.innerHTML = `<span class="pill ${rewardClass(r.reward)}">${r.reward.toFixed(2)}</span>
      <span class="ex" title="ex ${r.example_id} · ${kind}">#${r.example_id} ${kind}</span>`;
    div.onclick = ()=>{ curRow=i; renderSidebar(); renderRow(); };
    sb.appendChild(div);
  }
}

function highlight(text){
  let h = text.replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  h = h.replace(/(&lt;\|im_(start|end)\|&gt;)/g, '<span class="tok-im">$1</span>');
  h = h.replace(/^(CALL)\b/gm, '<span class="tok-CALL">$1</span>');
  h = h.replace(/^(RESULT)\b/gm, '<span class="tok-RESULT">$1</span>');
  h = h.replace(/^(FINAL)\b/gm, '<span class="tok-FINAL">$1</span>');
  return h;
}

function msgBlock(role, content, sub){
  if (!content || !content.trim()) return "";
  const cls = "role-" + (["system","user","assistant","tool","text"].includes(role)?role:"text");
  return `<div class="msg ${cls}">
    <div class="head">${role}${sub?`<span class="sub">${sub}</span>`:""}</div>
    <pre>${highlight(content||"")}</pre></div>`;
}

// split a flat prompt "text" blob into role-tagged segments
function splitFlat(content){
  const out = [];
  const re = /<\|im_start\|>(system|user|assistant|tool)\n([\s\S]*?)(?=<\|im_start\|>|$)/g;
  let m, any=false;
  while ((m = re.exec(content))){
    any=true;
    out.push({role:m[1], content:m[2].replace(/<\|im_end\|>\s*$/,"").trimEnd()});
  }
  return any ? out : [{role:"text", content}];
}

function renderRow(){
  const c = document.getElementById("content");
  if (!rows.length){ c.innerHTML = '<div class="empty">No rows.</div>'; return; }
  const r = rows[curRow];
  const f = r.filters || {};
  const info = r.info || {};
  const flag = (name,on)=>`<span class="flag ${on?'on':'off'}">${name}</span>`;

  let html = `<div class="meta">
    <span class="kv"><b>example_id</b>${r.example_id}</span>
    <span class="kv"><b>kind</b>${info.kind||"—"}</span>
    <span class="kv"><b>expected_tool</b>${info.expected_tool||"—"}</span>
    <span class="kv"><b>reward</b><span class="pill ${rewardClass(r.reward)}">${r.reward.toFixed(3)}</span></span>
    <span class="kv"><b>advantage</b>${(r.advantage??0).toFixed(3)}</span>
    <span class="kv"><b>num_turns</b>${r.num_turns}</span>
    <span class="kv"><b>stop</b>${r.stop_condition||"—"}</span>
    ${flag("completed", r.is_completed)}
    ${flag("truncated", r.is_truncated)}
    ${flag("filtered", r.is_filtered)}
    ${flag("gibberish", f.gibberish)}
    ${flag("repetition", f.repetition)}
    ${flag("zero_advantage", f.zero_advantage)}
  </div>`;

  if (r.error) html += `<div class="msg role-tool"><div class="head">error</div><pre>${highlight(String(r.error))}</pre></div>`;

  html += `<div class="section-label">Prompt</div>`;
  for (const m of (r.prompt||[])){
    if (m.role === "text") for (const seg of splitFlat(m.content)) html += msgBlock(seg.role, seg.content);
    else html += msgBlock(m.role, m.content);
  }

  html += `<div class="section-label">Completion</div>`;
  for (const m of (r.completion||[])){
    let sub = "";
    if (m.role==="tool" && m.tool_call_id) sub = "id="+m.tool_call_id;
    html += msgBlock(m.role, m.content, sub);
  }

  c.innerHTML = html;
  c.scrollTop = 0;
}

document.getElementById("dirSel").onchange = e=>loadDir(e.target.value, curStep);
document.getElementById("stepSel").onchange = e=>loadStep(parseInt(e.target.value));
document.getElementById("pickBtn").onclick = ()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = e=>{
  const f = e.target.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = ()=>{ setPath(f.name+" (local file)"); loadText(rd.result, f.name); };
  rd.readAsText(f);
};
document.getElementById("urlBtn").onclick = async ()=>{
  const u = prompt("URL or server path to .jsonl:", curStep!=null?pathFor(curStep):ROOT);
  if(!u) return;
  try { setPath(u); loadText(await (await fetch(u)).text(), u.split("/").pop()); }
  catch(err){ document.getElementById("content").innerHTML='<div class="empty">Failed: '+err+'</div>'; }
};
document.getElementById("sortSel").onchange = renderSidebar;
document.getElementById("prevStep").onclick = ()=>{ const i=steps.indexOf(curStep); if(i>0) loadStep(steps[i-1]); };
document.getElementById("nextStep").onclick = ()=>{ const i=steps.indexOf(curStep); if(i<steps.length-1) loadStep(steps[i+1]); };
document.addEventListener("keydown", e=>{
  if (e.target.tagName==="SELECT") return;
  if (e.key==="j" || e.key==="ArrowDown"){ if(curRow<rows.length-1){curRow++;renderSidebar();renderRow();} }
  if (e.key==="k" || e.key==="ArrowUp"){ if(curRow>0){curRow--;renderSidebar();renderRow();} }
});

(async ()=>{
  const dirs = await discoverDirs();
  const first = dirs.includes("rollouts") ? "rollouts" : dirs[0];
  if (first){ document.getElementById("dirSel").value = first; await loadDir(first); }
})();
</script>
</body>
</html>
