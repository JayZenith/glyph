batch_size = 48
# More rollouts/example => within-group variance => informative GRPO advantages.
# v6/v7 used 4 and produced ~56% zero-advantage groups (no gradient); 8 is the floor.
rollouts_per_example = 8
seq_len = 5120
# Stop early on the held-out eval; the best checkpoint in every prior run was the
# earliest (step ~25), and 25->50->75 regressed. Do not train to 200.
max_steps = 200

[model]
# Train from SFT_V1: it solves efficiently (terminal 68/69) and its only gap is
# stopping after success -- the clean RL target. SFT_V2/V3 over-recover (churn),
# which RL would have to unteach first.
name = "JayZenith/SFT_V1"

[train.sampling]
temperature = 0.8
max_completion_tokens = 1536

[[train.env]]
id = "task-trace"
args = { data_path = "synthetic_data/rl_prompts_v2_1323.jsonl", timeout = 30, max_tool_rounds = 15 }

[[filters]]
type = "gibberish"
enforce = true

[[filters]]
type = "repetition"
enforce = true

# Enforce: drop all-identical-reward groups so easy prompts can't waste compute
# or dominate, and only informative (variance-bearing) groups produce gradient.
[[filters]]
type = "zero_advantage"
enforce = true

[ckpt]
interval = 1000
